<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sign in — Stizzy</title>
<meta name="color-scheme" content="dark">
<style>
:root{
  /* softer, multi-tonal dark theme (not pure black) */
  --bg-1: #07121a;   /* darkest tone */
  --bg-2: #0d1620;   /* mid tone */
  --card: rgba(22,26,32,0.94); /* card */
  --border: rgba(255,255,255,0.06);
  --muted: #b3bcc6;
  --text: #eef3f7;
  --accent: #ffffff;
  --radius:20px;
  --blur:30px;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Reset */
*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 600px at 10% 10%, rgba(14,30,42,0.45), transparent 10%),
    radial-gradient(900px 500px at 90% 90%, rgba(8,16,24,0.45), transparent 8%),
    linear-gradient(180deg, var(--bg-2) 0%, var(--bg-1) 100%);
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:22px;
}

/* Card */
.card{
  width:100%;
  max-width:460px;
  background: linear-gradient(180deg, rgba(26,30,36,0.98), rgba(20,24,30,0.96));
  border-radius:var(--radius);
  border:1px solid var(--border);
  padding:44px 36px;
  backdrop-filter: blur(var(--blur));
  box-shadow: 0 30px 70px rgba(2,6,12,0.65);
  overflow:hidden;
}

/* Title */
.card h1{
  font-size:24px;
  font-weight:600;
  text-align:center;
  margin-bottom:28px;
  letter-spacing:-0.2px;
  color:var(--text);
}

/* Form */
form{
  display:flex;
  flex-direction:column;
  gap:18px;
}

label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
}

/* Inputs */
input[type="email"],
input[type="password"]{
  width:100%;
  padding:14px 14px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,0.04);
  background: linear-gradient(180deg, rgba(10,12,14,0.65), rgba(14,16,18,0.55));
  color:var(--text);
  font-size:15px;
  transition: box-shadow .18s ease, border-color .18s ease, transform .12s ease;
  -webkit-appearance:none;
}

input::placeholder{ color: #9aa6b3; }

input:focus{
  outline:none;
  border-color: rgba(255,255,255,0.12);
  box-shadow: 0 8px 30px rgba(7,14,24,0.45);
  transform: translateY(-1px);
}

/* Options row (only Remember left) */
.options{
  display:flex;
  align-items:center;
  justify-content:flex-start;
  gap:12px;
  flex-wrap:wrap;
  margin-top:-2px;
}

/* Remember checkbox styling */
.remember{
  display:flex;
  align-items:center;
  gap:10px;
  font-size:13px;
  color:var(--muted);
  cursor:pointer;
  user-select:none;
}

.remember input{
  width:18px;
  height:18px;
  accent-color: #ffffff;
  background:transparent;
  border-radius:4px;
  cursor:pointer;
  -webkit-appearance:none;
  appearance:none;
  border:1px solid rgba(255,255,255,0.06);
  display:inline-grid;
  place-items:center;
}

.remember input:before{
  content: "";
  width:10px;
  height:10px;
  transform:scale(0);
  transition: transform .12s ease;
  background: linear-gradient(180deg, #fff, #e9eef8);
  border-radius:2px;
  display:block;
}

.remember input:checked{ background:transparent; }
.remember input:checked:before{ transform:scale(1); }

/* Actions (buttons) */
.actions{
  display:flex;
  flex-direction:column;
  gap:12px;
  margin-top:6px;
}

button{
  padding:14px;
  border-radius:12px;
  border:0;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
  min-height:48px;
}

/* Primary button: soft off-white for strong contrast */
.primary{
  background: linear-gradient(180deg,#f8fafc,#e6eef9);
  color:#030409;
  box-shadow: 0 8px 30px rgba(14,18,24,0.35);
}

.primary:active{ transform: translateY(1px); box-shadow: 0 6px 22px rgba(14,18,24,0.3); }

/* Secondary button: subtle outlined */
.secondary{
  background: transparent;
  border: 1px solid rgba(255,255,255,0.04);
  color:var(--text);
  backdrop-filter: blur(6px);
}

.secondary:active{ transform: translateY(1px); }

/* Buttons arrange side-by-side on wider screens */
@media(min-width:600px){
  .actions{
    flex-direction:row;
  }
  .actions button{ flex:1; }
}

/* Status display */
.status{
  display:none;
  text-align:center;
  margin-top:6px;
}

.status.active{ display:block; }

.status h2{
  font-size:20px;
  margin-bottom:12px;
  color:var(--text);
  font-weight:600;
}

.notice{
  padding:14px;
  border-radius:12px;
  background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
  border:1px solid rgba(255,255,255,0.04);
  color:var(--muted);
  margin-bottom:14px;
  line-height:1.45;
}

/* Small screens: reduce padding slightly so nothing cuts off */
@media(max-width:380px){
  .card{ padding:28px 20px; max-width:96vw; }
  .card h1{ font-size:20px; margin-bottom:22px; }
  input[type="email"], input[type="password"]{ padding:12px; }
  button{ padding:12px; min-height:44px; font-size:14px; }
}

/* Accessibility: focus ring for keyboard users */
:focus-visible{ outline: 3px solid rgba(255,255,255,0.06); outline-offset:3px; border-radius:8px; }

</style>
</head>
<body>

<div class="card" role="region" aria-labelledby="signin-heading">
  <form id="loginForm" autocomplete="on" novalidate>
    <h1 id="signin-heading">Sign In</h1>

    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="name@stizzy.life" required autocomplete="email" inputmode="email" />
    </div>

    <div>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" placeholder="Enter your password" required autocomplete="current-password" />
    </div>

    <div class="options">
      <label class="remember" for="remember">
        <input id="remember" name="remember" type="checkbox" />
        <span>Remember me</span>
      </label>
    </div>

    <div class="actions" role="group" aria-label="auth actions">
      <button type="submit" class="primary" id="signInBtn">Sign In</button>
      <button type="button" class="secondary" id="helpBtn">Need Help?</button>
    </div>
  </form>

  <!-- Status (shown after submit) -->
  <div id="statusPage" class="status" role="status" aria-live="polite" aria-hidden="true">
    <h2>Service Temporarily Unavailable</h2>
    <div class="notice">
      Our authentication system is currently undergoing scheduled maintenance.
      Your account remains secure and protected during this time.
    </div>
    <p style="color:var(--muted); margin:0 0 12px 0;">Please try again shortly.</p>
    <div style="display:flex; gap:10px; justify-content:center; margin-top:8px;">
      <button class="secondary" id="backBtn">Return</button>
    </div>
  </div>
</div>

<script>
/* Client-only UX: show status page after "login" without sending credentials */
(function(){
  const form = document.getElementById('loginForm');
  const status = document.getElementById('statusPage');
  const backBtn = document.getElementById('backBtn');
  const signInBtn = document.getElementById('signInBtn');
  const helpBtn = document.getElementById('helpBtn');

  // Prevent accidental form submission if fields empty
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = (document.getElementById('email').value || '').trim();
    const pwd = (document.getElementById('password').value || '');

    if(!email || !pwd){
      // friendly inline UX
      alert('Please enter both email and password.');
      if(!email) document.getElementById('email').focus();
      else document.getElementById('password').focus();
      return;
    }

    // clear sensitive field, show a quick "connecting" feeling, then show status
    document.getElementById('password').value = '';
    signInBtn.disabled = true;
    signInBtn.textContent = 'Connecting...';

    setTimeout(() => {
      signInBtn.disabled = false;
      signInBtn.textContent = 'Sign In';
      form.style.display = 'none';
      status.classList.add('active');
      status.setAttribute('aria-hidden','false');
      // focus return button for accessibility
      backBtn.focus();
    }, 850);
  });

  backBtn.addEventListener('click', () => {
    // quickly return to sign-in
    status.classList.remove('active');
    status.setAttribute('aria-hidden','true');
    form.style.display = '';
    document.getElementById('email').focus();
  });

  helpBtn.addEventListener('click', () => {
    // open mail client with support placeholder; replace as needed
    window.location.href = 'mailto:support@example.com';
  });

})();
</script>
</body>
</html>
