<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — Stizzy</title>

<style>
:root{
  --bg:#000;
  --card:rgba(18,18,18,0.92);
  --border:rgba(255,255,255,0.08);
  --text:#fff;
  --muted:#9ca3af;
  --radius:22px;
  --blur:40px;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}

*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  min-height:100vh;
  background:radial-gradient(circle at 30% 30%, #1a1a1a 0%, #000 55%);
  display:flex;
  align-items:center;
  justify-content:center;
  padding:24px;
  color:var(--text);
}

/* Card */
.card{
  width:100%;
  max-width:420px;
  background:var(--card);
  backdrop-filter:blur(var(--blur));
  border:1px solid var(--border);
  border-radius:var(--radius);
  padding:42px 32px;
  box-shadow:0 40px 80px rgba(0,0,0,0.7);
}

/* Title */
.card h1{
  font-size:24px;
  font-weight:600;
  text-align:center;
  margin-bottom:34px;
  letter-spacing:-0.3px;
}

/* Form */
form{
  display:flex;
  flex-direction:column;
  gap:22px;
}

label{
  font-size:13px;
  color:var(--muted);
  margin-bottom:6px;
  display:block;
}

input[type="email"],
input[type="password"]{
  width:100%;
  padding:16px;
  border-radius:14px;
  border:1px solid var(--border);
  background:#0f0f0f;
  color:#fff;
  font-size:15px;
  transition:all .25s ease;
}

input:focus{
  outline:none;
  border-color:#ffffff40;
  background:#151515;
}

/* Options Row */
.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  margin-top:-4px;
}

.remember{
  display:flex;
  align-items:center;
  gap:8px;
  font-size:13px;
  color:var(--muted);
  cursor:pointer;
}

.remember input{
  width:16px;
  height:16px;
  accent-color:#ffffff;
  cursor:pointer;
}

.forgot{
  font-size:13px;
  color:var(--muted);
  text-decoration:none;
  transition:opacity .2s ease;
}

.forgot:hover{
  opacity:0.7;
}

/* Stack cleanly on very small screens */
@media(max-width:420px){
  .options{
    flex-direction:column;
    align-items:flex-start;
    gap:10px;
  }
}

/* Buttons */
.actions{
  display:flex;
  flex-direction:column;
  gap:14px;
  margin-top:8px;
}

button{
  padding:16px;
  border-radius:14px;
  border:none;
  font-size:15px;
  font-weight:600;
  cursor:pointer;
  transition:all .25s ease;
}

.primary{
  background:#fff;
  color:#000;
}

.primary:hover{
  background:#e5e5e5;
}

.secondary{
  background:transparent;
  border:1px solid var(--border);
  color:#fff;
}

.secondary:hover{
  background:#111;
}

/* Desktop button alignment */
@media(min-width:600px){
  .actions{
    flex-direction:row;
  }
  .actions button{
    flex:1;
  }
}

/* Status Screen */
.status{
  display:none;
  text-align:center;
}

.status.active{
  display:block;
}

.status h2{
  font-size:22px;
  margin-bottom:18px;
  font-weight:500;
}

.notice{
  padding:18px;
  border-radius:16px;
  background:#111;
  border:1px solid var(--border);
  color:var(--muted);
  margin-bottom:22px;
  line-height:1.5;
}
</style>
</head>

<body>

<div class="card">

  <form id="loginForm">
    <h1>Sign In</h1>

    <div>
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="name@stizzy.life" required>
    </div>

    <div>
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter your password" required>
    </div>

    <div class="options">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span>Remember me</span>
      </label>

      <a href="#" class="forgot">Forgot password?</a>
    </div>

    <div class="actions">
      <button type="submit" class="primary">Sign In</button>
      <button type="button" class="secondary">Need Help?</button>
    </div>
  </form>

  <!-- Status Redirect -->
  <div id="statusPage" class="status">
    <h2>Service Temporarily Unavailable</h2>
    <div class="notice">
      Our authentication system is currently undergoing scheduled maintenance.
      Your account remains secure and protected during this time.
    </div>
    <p>Please try again shortly.</p>
    <div style="margin-top:22px;">
      <button class="secondary" onclick="location.reload()">Return</button>
    </div>
  </div>

</div>

<script>
const form = document.getElementById("loginForm");
const statusPage = document.getElementById("statusPage");

form.addEventListener("submit", function(e){
  e.preventDefault();
  document.getElementById("password").value = "";
  form.style.display = "none";
  statusPage.classList.add("active");
});
</script>

</body>
</html>
